# Deploy the FastAPI API and same-origin static UI on Render.
# After push: Dashboard -> New -> Blueprint -> connect this repo, or open:
#   https://dashboard.render.com/blueprint/new?repo=https://github.com/<you>/<repo>
#
# Optional:
# - set OPENAI_API_KEY if you want GPT-backed diagnosis
# - add DATABASE_URL if you want persistent PostgreSQL logs
# - otherwise the app can use SQLite for a quick demo deploy

services:
  - type: web
    name: tractor-pm-api
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: OPENAI_API_KEY
        sync: false
