services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tractor
      POSTGRES_PASSWORD: tractor
      POSTGRES_DB: tractor_pm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg2://tractor:tractor@db:5432/tractor_pm
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata: {}
